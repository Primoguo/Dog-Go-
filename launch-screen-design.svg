<svg width="1170" height="2532" viewBox="0 0 1170 2532" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1170" height="2532" fill="url(#bgGradient)"/>

  <!-- App 名称（像素风格文字） -->
  <text x="585" y="600" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    自律狗
  </text>
  <text x="585" y="720" font-family="Arial, sans-serif" font-size="60" fill="#FFFFFF" text-anchor="middle" opacity="0.9">
    Dog Go
  </text>

  <!-- 像素狗身体（坐姿） -->
  <!-- 身体主体（奶油色） -->
  <rect x="485" y="1200" width="200" height="280" fill="#F5DEB3"/>
  <rect x="445" y="1280" width="40" height="200" fill="#F5DEB3"/>
  <rect x="685" y="1280" width="40" height="200" fill="#F5DEB3"/>

  <!-- 头部（奶油色） -->
  <rect x="445" y="1000" width="280" height="240" fill="#F5DEB3"/>
  <rect x="405" y="1040" width="40" height="160" fill="#F5DEB3"/>
  <rect x="725" y="1040" width="40" height="160" fill="#F5DEB3"/>
  <rect x="485" y="960" width="200" height="40" fill="#F5DEB3"/>

  <!-- 耳朵（橙色） -->
  <rect x="405" y="960" width="60" height="100" fill="#E89B4F"/>
  <rect x="365" y="1000" width="40" height="60" fill="#E89B4F"/>
  <rect x="705" y="960" width="60" height="100" fill="#E89B4F"/>
  <rect x="765" y="1000" width="40" height="60" fill="#E89B4F"/>

  <!-- 眼睛（微笑弯月形） -->
  <rect x="485" y="1100" width="60" height="30" fill="#2A241F"/>
  <rect x="485" y="1130" width="30" height="15" fill="#2A241F"/>
  <rect x="545" y="1130" width="30" height="15" fill="#2A241F"/>

  <rect x="625" y="1100" width="60" height="30" fill="#2A241F"/>
  <rect x="625" y="1130" width="30" height="15" fill="#2A241F"/>
  <rect x="685" y="1130" width="30" height="15" fill="#2A241F"/>

  <!-- 鼻子 -->
  <rect x="565" y="1160" width="40" height="35" fill="#2A241F"/>

  <!-- 嘴巴（微笑） -->
  <rect x="525" y="1195" width="30" height="15" fill="#2A241F"/>
  <rect x="615" y="1195" width="30" height="15" fill="#2A241F"/>
  <rect x="555" y="1210" width="60" height="15" fill="#2A241F"/>

  <!-- 舌头 -->
  <rect x="570" y="1225" width="30" height="25" fill="#FFB6C1"/>

  <!-- 脸颊红晕 -->
  <circle cx="465" cy="1160" r="20" fill="#FFB6C1" opacity="0.6"/>
  <circle cx="705" cy="1160" r="20" fill="#FFB6C1" opacity="0.6"/>

  <!-- 前腿（坐姿） -->
  <rect x="465" y="1440" width="60" height="120" fill="#F5DEB3"/>
  <rect x="645" y="1440" width="60" height="120" fill="#F5DEB3"/>

  <!-- 爪子 -->
  <rect x="455" y="1540" width="80" height="30" fill="#E89B4F"/>
  <rect x="635" y="1540" width="80" height="30" fill="#E89B4F"/>

  <!-- 尾巴（橙色，向上翘） -->
  <rect x="685" y="1300" width="40" height="80" fill="#E89B4F"/>
  <rect x="725" y="1260" width="40" height="60" fill="#E89B4F"/>
  <rect x="765" y="1240" width="30" height="40" fill="#E89B4F"/>

  <!-- 装饰：小星星 -->
  <g transform="translate(300, 900)">
    <rect x="0" y="15" width="15" height="15" fill="#FFD700"/>
    <rect x="15" y="0" width="15" height="45" fill="#FFD700"/>
    <rect x="30" y="15" width="15" height="15" fill="#FFD700"/>
  </g>

  <g transform="translate(800, 1000)">
    <rect x="0" y="15" width="15" height="15" fill="#FFD700"/>
    <rect x="15" y="0" width="15" height="45" fill="#FFD700"/>
    <rect x="30" y="15" width="15" height="15" fill="#FFD700"/>
  </g>

  <g transform="translate(250, 1400)">
    <rect x="0" y="10" width="10" height="10" fill="#FFD700" opacity="0.7"/>
    <rect x="10" y="0" width="10" height="30" fill="#FFD700" opacity="0.7"/>
    <rect x="20" y="10" width="10" height="10" fill="#FFD700" opacity="0.7"/>
  </g>

  <!-- 底部文字 -->
  <text x="585" y="2300" font-family="Arial, sans-serif" font-size="40" fill="#FFFFFF" text-anchor="middle" opacity="0.7">
    陪你一起自律
  </text>
</svg>
