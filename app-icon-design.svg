<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>

  <!-- 像素狗头部 - 使用 32x32 像素网格，每格 32x32 像素 -->
  <!-- 头部主体（奶油色） -->
  <rect x="320" y="288" width="384" height="320" fill="#F5DEB3"/>
  <rect x="288" y="320" width="32" height="256" fill="#F5DEB3"/>
  <rect x="704" y="320" width="32" height="256" fill="#F5DEB3"/>
  <rect x="352" y="256" width="320" height="32" fill="#F5DEB3"/>

  <!-- 耳朵（橙色） -->
  <rect x="288" y="256" width="64" height="96" fill="#E89B4F"/>
  <rect x="256" y="288" width="32" height="64" fill="#E89B4F"/>
  <rect x="672" y="256" width="64" height="96" fill="#E89B4F"/>
  <rect x="736" y="288" width="32" height="64" fill="#E89B4F"/>

  <!-- 眼睛（黑色，微笑的弯月形） -->
  <rect x="384" y="416" width="64" height="32" fill="#2A241F"/>
  <rect x="384" y="448" width="32" height="16" fill="#2A241F"/>
  <rect x="448" y="448" width="32" height="16" fill="#2A241F"/>

  <rect x="576" y="416" width="64" height="32" fill="#2A241F"/>
  <rect x="576" y="448" width="32" height="16" fill="#2A241F"/>
  <rect x="640" y="448" width="32" height="16" fill="#2A241F"/>

  <!-- 鼻子（黑色） -->
  <rect x="480" y="480" width="64" height="48" fill="#2A241F"/>

  <!-- 嘴巴（微笑曲线） -->
  <rect x="448" y="528" width="32" height="16" fill="#2A241F"/>
  <rect x="544" y="528" width="32" height="16" fill="#2A241F"/>
  <rect x="480" y="544" width="64" height="16" fill="#2A241F"/>

  <!-- 舌头（粉色，小舌头伸出） -->
  <rect x="496" y="560" width="32" height="32" fill="#FFB6C1"/>

  <!-- 脸颊红晕（粉色圆形） -->
  <circle cx="352" cy="480" r="24" fill="#FFB6C1" opacity="0.6"/>
  <circle cx="672" cy="480" r="24" fill="#FFB6C1" opacity="0.6"/>

  <!-- 小装饰：星星（代表成就感） -->
  <g transform="translate(768, 256)">
    <rect x="0" y="16" width="16" height="16" fill="#FFD700"/>
    <rect x="16" y="0" width="16" height="48" fill="#FFD700"/>
    <rect x="32" y="16" width="16" height="16" fill="#FFD700"/>
  </g>
</svg>
